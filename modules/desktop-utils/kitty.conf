# Single-instance daemon mode - reuse GPU/font cache across windows
single_instance yes
listen_on unix:/tmp/kitty-socket

# Faster rendering and input response
repaint_delay 2
input_delay 1

#: Fonts {{{
font_family      FiraCode Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 10
force_ltr yes
adjust_line_height  0
adjust_column_width 0
disable_ligatures never
#: }}}

#: Cursor customization {{{
 cursor #dc3232
#: Default cursor color
 cursor_text_color #FFFFFF
 cursor_shape beam
#: }}}

#: Scrollback {{{
 scrollback_lines 1000
 wheel_scroll_multiplier 5.0
 touch_scroll_multiplier 1.0
#: }}}

#: Mouse {{{
 mouse_hide_wait 0.0
 url_color #0087bd
 url_style curly
 open_url_with default
 focus_follows_mouse yes
#: }}}

# Window settings
#: Window layout {{{
 map alt+1 first_window
 map alt+2 second_window
 map alt+3 third_window
 map alt+left neighboring_window left
 map alt+right neighboring_window right
 map alt+up neighboring_window up
 map alt+down neighboring_window down
 map alt+[ previous_window
 map alt+] next_window
 window_border_width 1.0
 draw_minimal_borders yes
 inactive_text_alpha 0.4
 window_padding_width 30
 placement_strategy center
 hide_window_decorations yes
#: }}}

#Tab bar settings
#: Tab bar {{{
 tab_bar_edge bottom
 tab_bar_margin_width 0.0
 tab_bar_style powerline
#: }}}

#Color Settings (Gruvbox Dark)
#: Color scheme {{{
 background_opacity 1.0
 dynamic_background_opacity yes

 # Toggle transparency on/off with Ctrl+Shift+O
 map ctrl+shift+o launch --type=overlay sh -c 'opacity=$(cat ~/.cache/kitty-opacity 2>/dev/null || echo "1.0"); if [ "$opacity" = "1.0" ]; then kitty @ set-background-opacity 0.94; echo 0.94 > ~/.cache/kitty-opacity; else kitty @ set-background-opacity 1.0; echo 1.0 > ~/.cache/kitty-opacity; fi'

 background #1d2021
 foreground #ebdbb2

 selection_background #504945
 selection_foreground #1d2021

 cursor #a89984
 cursor_text_color #1d2021

 active_tab_background #1d2021
 active_tab_foreground #d5c4a1
 active_tab_font_style bold
 inactive_tab_background #3c3836
 inactive_tab_foreground #a89984
 inactive_tab_font_style normal

 # Active/inactive window borders (match niri aqua glow)
 active_border_color #83a598
 inactive_border_color #504945

 color0  #3c3836
 color8  #928374
 color1  #cc241d
 color9  #fb4934
 color2  #98971a
 color10 #b8bb26
 color3  #d79921
 color11 #fabd2f
 color4  #458588
 color12 #83a598
 color5  #b16286
 color13 #d3869b
 color6  #689d6a
 color14 #8ec07c
 color7  #a89984
 color15 #ebdbb2

#: }}}

#Clipboard Settings
#: Clipboard {{{
 map cmd+c        copy_to_clipboard
#: }}}

# Resizing fonts
#: Font sizes {{{
 map cmd+plus            change_font_size all +2.0
 map cmd+minus           change_font_size all -2.0
#: }}}

# Splits
# Resize with ctrl+sift+r
# {{{
enabled_layouts splits
map ctrl+enter launch --location=vsplit
map ctrl+shift+enter launch --location=hsplit
# }}}

#: Terminal bell {{{
 enable_audio_bell no
 window_alert_on_bell no
#: }}}

#for opening preview in nnn
allow_remote_control yes

# 0 disables it; -1 enables it
confirm_os_window_close 0

# Pass ctrl+s through to shell (disable flow control)
map ctrl+s send_text all \x13

# kitty-scrollback.nvim
shell_integration enabled
action_alias kitty_scrollback_nvim kitten ~/.local/share/nvim/lazy/kitty-scrollback.nvim/python/kitty_scrollback_nvim.py --env KITTY_SCROLLBACK_NVIM=true

# Browse scrollback buffer in nvim
map ctrl+shift+h kitty_scrollback_nvim
# Browse output of the last shell command in nvim
map ctrl+shift+g kitty_scrollback_nvim --config-file get_text_last_cmd_output
# Show clicked command output in nvim
mouse_map ctrl+shift+right press ungrabbed combine : mouse_select_command_output : kitty_scrollback_nvim --config-file get_text_last_cmd_output

# Additional settings for better tiling window manager compatibility
# Disable features that might cause fullscreen/maximize behavior
remember_window_size no
remember_window_position no
resize_in_steps yes
window_resize_step_cells 1
window_resize_step_lines 1

# Awrit browser - vertical split
map alt+b launch --location=vsplit --cwd=current bash -c "kitty @ set-spacing --match=recent:0 padding=0; awrit --remote-debugging-port=9222"

# Awrit browser - horizontal split
map ctrl+alt+b launch --location=hsplit --cwd=current bash -c "kitty @ set-spacing --match=recent:0 padding=0; awrit --remote-debugging-port=9222"

# Awrit browser - new tab
map shift+alt+b launch --type=tab --cwd=current bash -c "kitty @ set-spacing --match=recent:0 padding=0; awrit --remote-debugging-port=9222"
