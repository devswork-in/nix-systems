#: Fonts {{{
font_family      FiraCode Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 14
force_ltr yes
adjust_line_height  0
adjust_column_width 0
disable_ligatures never
#: }}}

#: Cursor customization {{{
 cursor #dc3232
#: Default cursor color
 cursor_text_color #FFFFFF
 cursor_shape beam
#: }}}

#: Scrollback {{{
 scrollback_lines 2000
 wheel_scroll_multiplier 5.0
 touch_scroll_multiplier 1.0
#: }}}

#: Mouse {{{
 mouse_hide_wait 0.0
 url_color #0087bd
 url_style curly
 open_url_with default
 focus_follows_mouse yes
#: }}}

# Window settings
#: Window layout {{{
 map alt+1 first_window
 map alt+2 second_window
 map alt+3 third_window
 map alt+tab next_window
 map alt+shift+tab previous_window
 window_border_width 0
 draw_minimal_borders no
 window_padding_width 30
 placement_strategy center
 active_border_color #00ff00
 inactive_border_color #cccccc
 hide_window_decorations yes
#: }}}

#Tab bar settings
#: Tab bar {{{
 tab_bar_edge bottom
 tab_bar_margin_width 0.0
 tab_bar_style powerline
#: }}}

#Color Settings (Gruvbox Dark)
#: Color scheme {{{
 background_opacity 0.94
 dynamic_background_opacity no

 background #1d2021
 foreground #ebdbb2

 selection_background #504945
 selection_foreground #1d2021

 cursor #a89984
 cursor_text_color #1d2021

 active_tab_background #1d2021
 active_tab_foreground #d5c4a1
 active_tab_font_style bold
 inactive_tab_background #3c3836
 inactive_tab_foreground #a89984
 inactive_tab_font_style normal

 # Active/inactive window borders (match niri aqua glow)
 active_border_color #83a598
 inactive_border_color #504945

 color0  #3c3836
 color8  #928374
 color1  #cc241d
 color9  #fb4934
 color2  #98971a
 color10 #b8bb26
 color3  #d79921
 color11 #fabd2f
 color4  #458588
 color12 #83a598
 color5  #b16286
 color13 #d3869b
 color6  #689d6a
 color14 #8ec07c
 color7  #a89984
 color15 #ebdbb2

#: }}}

#Clipboard Settings
#: Clipboard {{{
 map cmd+c        copy_to_clipboard
#: }}}

#: Search {{{
 map ctrl+f launch --type=overlay --stdin-source=@screen_scrollback /usr/bin/env fzf --no-sort --no-mouse --exact -i
#: }}}

# Resizing fonts
#: Font sizes {{{
 map cmd+plus            change_font_size all +2.0
 map cmd+minus           change_font_size all -2.0
#: }}}

# Splits
# Resize with ctrl+sift+r
# {{{
enabled_layouts splits
map ctrl+enter launch --location=vsplit
map ctrl+shift+enter launch --location=hsplit
# }}}

#: Terminal bell {{{
 enable_audio_bell no
 window_alert_on_bell no
#: }}}

#for opening preview in nnn
allow_remote_control yes

# 0 disables it; -1 enables it
confirm_os_window_close 0

# Pass ctrl+s through to shell (disable flow control)
map ctrl+s send_text all \x13

# Additional settings for better tiling window manager compatibility
# Disable features that might cause fullscreen/maximize behavior
remember_window_size no
remember_window_position no
resize_in_steps yes
window_resize_step_cells 1
window_resize_step_lines 1
